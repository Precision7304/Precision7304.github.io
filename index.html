<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>智能加湿器控制</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0a0e1a;
      --card: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf4;
      --text-dim: #6b7280;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --steam: #06b6d4;
      --fan: #8b5cf6;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 24px);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .header .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Connection bar */
    .conn-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .conn-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .conn-btn.connect {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .conn-btn.connect:active {
      transform: scale(0.97);
    }

    .conn-btn.disconnect {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .conn-btn.disconnect:active {
      transform: scale(0.97);
    }

    .conn-status {
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .conn-status.off {
      background: rgba(107, 114, 128, 0.2);
      color: var(--text-dim);
    }

    .conn-status.on {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .stat-value.temp {
      color: #f97316;
    }

    .stat-value.humid {
      color: var(--steam);
    }

    .stat-value.power {
      color: var(--warning);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Power button */
    .power-section {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .power-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(107, 114, 128, 0.3);
      background: rgba(107, 114, 128, 0.1);
      color: var(--text-dim);
      font-size: 28px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .power-btn.active {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3), 0 0 60px rgba(16, 185, 129, 0.1);
    }

    .power-btn:active {
      transform: scale(0.92);
    }

    /* Slider control */
    .slider-control {
      margin-bottom: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label {
      font-size: 13px;
      font-weight: 500;
    }

    .slider-value {
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: transform 0.2s;
    }

    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.2);
    }

    .slider-steam input {
      accent-color: var(--steam);
    }

    .slider-steam input::-webkit-slider-thumb {
      background: var(--steam);
    }

    .slider-fan input {
      accent-color: var(--fan);
    }

    .slider-fan input::-webkit-slider-thumb {
      background: var(--fan);
    }

    .slider-wind input {
      accent-color: #f59e0b;
    }

    .slider-wind input::-webkit-slider-thumb {
      background: #f59e0b;
    }

    /* Wind direction visual */
    .wind-dir-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 8px 0 4px;
    }

    .wind-arc {
      width: 180px;
      height: 100px;
      position: relative;
      margin-bottom: -5px;
    }

    .wind-arc svg {
      width: 100%;
      height: 100%;
    }

    .wind-arrow {
      transition: transform 0.15s ease-out;
      transform-origin: 90px 95px;
    }

    .wind-labels {
      display: flex;
      justify-content: space-between;
      width: 180px;
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .toggle-row+.toggle-row {
      margin-top: 8px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
    }

    .toggle.active {
      background: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .toggle.active::after {
      transform: translateX(20px);
    }

    /* Humidity auto section */
    .humid-target {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--card-border);
      transition: opacity 0.3s, max-height 0.3s;
    }

    .humid-target.hidden {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      margin: 0;
      padding: 0;
      border: none;
    }

    /* Mode pills */
    .mode-pills {
      display: flex;
      gap: 8px;
    }

    .mode-pill {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .mode-pill.active {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Disabled state overlay */
    .disabled-overlay {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(0.5);
      transition: all 0.4s;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.15);
    }

    /* Animations */
    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card,
    .stat-card {
      animation: fadeIn 0.5s ease-out both;
    }

    .card:nth-child(2) {
      animation-delay: 0.05s;
    }

    .card:nth-child(3) {
      animation-delay: 0.10s;
    }

    .card:nth-child(4) {
      animation-delay: 0.15s;
    }

    .card:nth-child(5) {
      animation-delay: 0.20s;
    }

    .card:nth-child(6) {
      animation-delay: 0.25s;
    }

    /* Color picker */
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .color-input-wrap {
      position: relative;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--card-border);
      flex-shrink: 0;
    }
    .color-input-wrap input[type="color"] {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 64px;
      height: 64px;
      border: none;
      cursor: pointer;
      background: none;
    }
    .color-preview {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      pointer-events: none;
    }
    .color-hex {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
      color: var(--text);
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>💧 智能加湿器</h1>
      <div class="subtitle">蓝牙智能控制</div>
    </div>

    <!-- Connection -->
    <div class="conn-bar">
      <button class="conn-btn connect" id="btnConnect" onclick="toggleConnection()">🔗 连接设备</button>
      <span class="conn-status off" id="connStatus">未连接</span>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-value temp" id="valTemp">--</div>
        <div class="stat-label">温度 °C</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-value humid" id="valHumid">--</div>
        <div class="stat-label">湿度 %</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-value power" id="valPower">--</div>
        <div class="stat-label">功率 %</div>
      </div>
    </div>

    <!-- Power -->
    <div class="power-section">
      <button class="power-btn" id="btnPower" onclick="togglePower()"><svg width="28" height="28" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2v6" />
          <path d="M18.4 6.6a9 9 0 1 1-12.8 0" />
        </svg></button>
    </div>

    <!-- Controls (disabled when off) -->
    <div id="controlsWrap">

      <!-- Steam -->
      <div class="card">
        <div class="card-title">🔥 蒸汽量</div>
        <div class="slider-control slider-steam">
          <div class="slider-header">
            <span class="slider-label">加热功率</span>
            <span class="slider-value" id="lblSteam">50%</span>
          </div>
          <input type="range" id="sldSteam" min="0" max="100" value="50" oninput="onSteamChange(this.value)">
        </div>
      </div>

      <!-- Wind Direction -->
      <div class="card">
        <div class="card-title">🌬️ 风向控制</div>
        <div class="wind-dir-visual">
          <div class="wind-arc">
            <svg viewBox="0 0 180 105" fill="none">
              <!-- Arc background -->
              <path d="M 15 95 A 80 80 0 0 1 165 95" stroke="rgba(255,255,255,0.08)" stroke-width="3" fill="none" />
              <!-- Tick marks -->
              <line x1="15" y1="95" x2="20" y2="88" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
              <line x1="90" y1="15" x2="90" y2="22" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
              <line x1="165" y1="95" x2="160" y2="88" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
              <!-- Arrow -->
              <g class="wind-arrow" id="windArrow">
                <line x1="90" y1="95" x2="90" y2="25" stroke="url(#arrowGrad)" stroke-width="3"
                  stroke-linecap="round" />
                <polygon points="90,20 84,32 96,32" fill="#f59e0b" />
              </g>
              <defs>
                <linearGradient id="arrowGrad" x1="0" y1="95" x2="0" y2="25">
                  <stop offset="0%" stop-color="rgba(245,158,11,0.2)" />
                  <stop offset="100%" stop-color="#f59e0b" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="wind-labels">
            <span>← 左60°</span>
            <span>中</span>
            <span>右60° →</span>
          </div>
        </div>
        <div class="slider-control slider-wind">
          <div class="slider-header">
            <span class="slider-label">风向角度</span>
            <span class="slider-value" id="lblWindDir">0°</span>
          </div>
          <input type="range" id="sldWindDir" min="-60" max="60" value="0" oninput="onWindDirChange(this.value)">
        </div>
        <!-- Sweep -->
        <div class="toggle-row" style="margin-top:12px;">
          <span class="toggle-label">🔄 扫风模式</span>
          <button class="toggle" id="btnSweep" onclick="toggleSweep()"></button>
        </div>
        <div id="sweepFreqWrap" class="humid-target hidden" style="border-top-color: var(--card-border);">
          <div class="slider-control">
            <div class="slider-header">
              <span class="slider-label">摇摆周期</span>
              <span class="slider-value" id="lblSweepFreq">4s</span>
            </div>
            <input type="range" id="sldSweepFreq" min="2" max="10" value="4" oninput="onSweepFreqChange(this.value)">
          </div>
        </div>
      </div>

      <!-- Wind Power -->
      <div class="card">
        <div class="card-title">💨 风力</div>
        <div class="slider-control slider-fan">
          <div class="slider-header">
            <span class="slider-label">风力大小</span>
            <span class="slider-value" id="lblWindPower">80%</span>
          </div>
          <input type="range" id="sldWindPower" min="0" max="100" value="80" oninput="onWindPowerChange(this.value)">
        </div>
      </div>

      <!-- Humidity Control -->
      <div class="card">
        <div class="card-title">🎯 湿度控制</div>
        <div class="mode-pills">
          <button class="mode-pill active" id="pillManual" onclick="setHumidMode(0)">🔓 常开模式</button>
          <button class="mode-pill" id="pillAuto" onclick="setHumidMode(1)">🤖 自动控制</button>
        </div>
        <div id="targetHumidWrap" class="humid-target hidden">
          <div class="slider-control">
            <div class="slider-header">
              <span class="slider-label">目标湿度</span>
              <span class="slider-value" id="lblTargetHumid">55%</span>
            </div>
            <input type="range" id="sldTargetHumid" min="30" max="90" value="55"
              oninput="onTargetHumidChange(this.value)">
          </div>
        </div>
      </div>

    </div>

    <!-- LED Strip Control -->
    <div class="card">
      <div class="card-title">💡 氛围灯</div>
      <div class="toggle-row">
        <span class="toggle-label">灯光开关</span>
        <button class="toggle" id="btnLed" onclick="toggleLed()"></button>
      </div>
      <div id="ledControlWrap" style="margin-top:12px;">
        <div class="color-row">
          <div class="color-input-wrap">
            <div class="color-preview" id="colorPreview" style="background:#FF9632;"></div>
            <input type="color" id="colorPicker" value="#FF9632" oninput="onColorChange(this.value)">
          </div>
          <span class="color-hex" id="lblColorHex">#FF9632</span>
        </div>
        <div class="slider-control">
          <div class="slider-header">
            <span class="slider-label">亮度</span>
            <span class="slider-value" id="lblLedBright">80</span>
          </div>
          <input type="range" id="sldLedBright" min="0" max="255" value="80"
            oninput="onLedBrightChange(this.value)">
        </div>
      </div>
    </div>

  </div><!-- controlsWrap -->

    <div class="footer">Smart Humidifier · BLE Control</div>

  </div>

  <script>
    // ============================================================
    // BLE Configuration
    // ============================================================
    const SERVICE_UUID = '4d6f7275-7300-0000-0000-000000000000';
    const CHAR_POWER_UUID = '4d6f7275-7300-0001-0000-000000000000';
    const CHAR_STEAM_UUID = '4d6f7275-7300-0002-0000-000000000000';
    const CHAR_WIND_DIR_UUID = '4d6f7275-7300-0003-0000-000000000000';
    const CHAR_SWEEP_UUID = '4d6f7275-7300-0004-0000-000000000000';
    const CHAR_SWEEP_FREQ_UUID = '4d6f7275-7300-0005-0000-000000000000';
    const CHAR_WIND_POWER_UUID = '4d6f7275-7300-0006-0000-000000000000';
    const CHAR_HUMID_MODE_UUID = '4d6f7275-7300-0007-0000-000000000000';
    const CHAR_TARGET_HUMID_UUID = '4d6f7275-7300-0008-0000-000000000000';
    const CHAR_CUR_TEMP_UUID = '4d6f7275-7300-0010-0000-000000000000';
    const CHAR_CUR_HUMID_UUID = '4d6f7275-7300-0011-0000-000000000000';
    const CHAR_CUR_POWER_UUID = '4d6f7275-7300-0012-0000-000000000000';
    const CHAR_LED_SWITCH_UUID = '4d6f7275-7300-0013-0000-000000000000';
    const CHAR_LED_COLOR_UUID  = '4d6f7275-7300-0014-0000-000000000000';
    const CHAR_LED_BRIGHT_UUID = '4d6f7275-7300-0015-0000-000000000000';

    let bleDevice = null;
    let bleServer = null;
    let chars = {};
    let connected = false;

    // Local state
    let state = {
      power: false,
      steam: 50,
      windDir: 0,
      sweep: false,
      sweepFreq: 4,
      windPower: 80,
      humidMode: 0,
      targetHumid: 55,
      ledOn: true,
      ledR: 255, ledG: 150, ledB: 50,
      ledBright: 80,
    };

    // ============================================================
    // BLE Connection
    // ============================================================
    async function toggleConnection() {
      if (connected) {
        await disconnect();
      } else {
        await connect();
      }
    }

    async function connect() {
      try {
        const btn = document.getElementById('btnConnect');
        btn.textContent = '⏳ 搜索中...';
        btn.disabled = true;

        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'Morus' }],
          optionalServices: [SERVICE_UUID],
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        btn.textContent = '⏳ 连接中...';

        bleServer = await bleDevice.gatt.connect();
        const service = await bleServer.getPrimaryService(SERVICE_UUID);

        // Get all characteristics
        const charUUIDs = {
          power: CHAR_POWER_UUID,
          steam: CHAR_STEAM_UUID,
          windDir: CHAR_WIND_DIR_UUID,
          sweep: CHAR_SWEEP_UUID,
          sweepFreq: CHAR_SWEEP_FREQ_UUID,
          windPower: CHAR_WIND_POWER_UUID,
          humidMode: CHAR_HUMID_MODE_UUID,
          targetHumid: CHAR_TARGET_HUMID_UUID,
          curTemp: CHAR_CUR_TEMP_UUID,
          curHumid: CHAR_CUR_HUMID_UUID,
          curPower: CHAR_CUR_POWER_UUID,
      ledSwitch: CHAR_LED_SWITCH_UUID,
      ledColor: CHAR_LED_COLOR_UUID,
      ledBright: CHAR_LED_BRIGHT_UUID,
        };

        for (const [key, uuid] of Object.entries(charUUIDs)) {
          chars[key] = await service.getCharacteristic(uuid);
        }

        // Subscribe to notifications
        await chars.curTemp.startNotifications();
        chars.curTemp.addEventListener('characteristicvaluechanged', onTempNotify);

        await chars.curHumid.startNotifications();
        chars.curHumid.addEventListener('characteristicvaluechanged', onHumidNotify);

        await chars.curPower.startNotifications();
        chars.curPower.addEventListener('characteristicvaluechanged', onPowerNotify);

        // Read initial values
        await readAllValues();

        setConnected(true);
      } catch (err) {
        console.error('BLE Error:', err);
        setConnected(false);
        const btn = document.getElementById('btnConnect');
        btn.textContent = '🔗 连接设备';
        btn.disabled = false;
      }
    }

    async function disconnect() {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
      setConnected(false);
    }

    function onDisconnected() {
      setConnected(false);
      console.log('BLE disconnected');
    }

    function setConnected(isConn) {
      connected = isConn;
      const btn = document.getElementById('btnConnect');
      const status = document.getElementById('connStatus');

      if (isConn) {
        btn.textContent = '❌ 断开连接';
        btn.className = 'conn-btn disconnect';
        btn.disabled = false;
        status.textContent = '已连接';
        status.className = 'conn-status on';
      } else {
        btn.textContent = '🔗 连接设备';
        btn.className = 'conn-btn connect';
        btn.disabled = false;
        status.textContent = '未连接';
        status.className = 'conn-status off';
      }
    }

    // ============================================================
    // Read initial values from device
    // ============================================================
    async function readAllValues() {
      try {
        const pv = await chars.power.readValue();
        state.power = pv.getUint8(0) !== 0;

        const sv = await chars.steam.readValue();
        state.steam = sv.getUint8(0);

        const dv = await chars.windDir.readValue();
        state.windDir = dv.getInt8(0);

        const swv = await chars.sweep.readValue();
        state.sweep = swv.getUint8(0) !== 0;

        const sfv = await chars.sweepFreq.readValue();
        state.sweepFreq = sfv.getUint8(0);

        const wpv = await chars.windPower.readValue();
        state.windPower = wpv.getUint8(0);

        const hmv = await chars.humidMode.readValue();
        state.humidMode = hmv.getUint8(0);

        const thv = await chars.targetHumid.readValue();
        state.targetHumid = thv.getUint8(0);

        const lsv = await chars.ledSwitch.readValue();
        state.ledOn = lsv.getUint8(0) !== 0;

        const lcv = await chars.ledColor.readValue();
        state.ledR = lcv.getUint8(0);
        state.ledG = lcv.getUint8(1);
        state.ledB = lcv.getUint8(2);

        const lbv = await chars.ledBright.readValue();
        state.ledBright = lbv.getUint8(0);

        updateAllUI();
      } catch (e) {
        console.error('Read error:', e);
      }
    }

    // ============================================================
    // Notifications
    // ============================================================
    function onTempNotify(event) {
      const val = event.target.value.getInt16(0, true);
      document.getElementById('valTemp').textContent = (val / 10).toFixed(1);
    }

    function onHumidNotify(event) {
      const val = event.target.value.getUint16(0, true);
      document.getElementById('valHumid').textContent = (val / 10).toFixed(1);
    }

    function onPowerNotify(event) {
      const val = event.target.value.getUint8(0);
      document.getElementById('valPower').textContent = val;
    }

    // ============================================================
    // BLE Write Helpers
    // ============================================================
    async function writeUint8(char, value) {
      if (!connected || !char) return;
      try {
        const buf = new Uint8Array([value]);
        await char.writeValue(buf);
      } catch (e) {
        console.error('Write error:', e);
      }
    }

    async function writeInt8(char, value) {
      if (!connected || !char) return;
      try {
        const buf = new Int8Array([value]);
        await char.writeValue(buf.buffer);
      } catch (e) {
        console.error('Write error:', e);
      }
    }

    // ============================================================
    // UI Event Handlers
    // ============================================================

    // Debouncer for sliders
    let writeTimers = {};
    function debouncedWrite(key, charObj, value, isInt8 = false) {
      clearTimeout(writeTimers[key]);
      writeTimers[key] = setTimeout(() => {
        if (isInt8) writeInt8(charObj, value);
        else writeUint8(charObj, value);
      }, 50);
    }

    function togglePower() {
      state.power = !state.power;
      updatePowerUI();
      writeUint8(chars.power, state.power ? 1 : 0);
    }

    function onSteamChange(val) {
      state.steam = parseInt(val);
      document.getElementById('lblSteam').textContent = val + '%';
      debouncedWrite('steam', chars.steam, state.steam);
    }

    function onWindDirChange(val) {
      state.windDir = parseInt(val);
      document.getElementById('lblWindDir').textContent = val + '°';
      updateWindArrow(state.windDir);
      debouncedWrite('windDir', chars.windDir, state.windDir, true);
    }

    function toggleSweep() {
      state.sweep = !state.sweep;
      updateSweepUI();
      writeUint8(chars.sweep, state.sweep ? 1 : 0);
    }

    function onSweepFreqChange(val) {
      state.sweepFreq = parseInt(val);
      document.getElementById('lblSweepFreq').textContent = val + 's';
      debouncedWrite('sweepFreq', chars.sweepFreq, state.sweepFreq);
    }

    function onWindPowerChange(val) {
      state.windPower = parseInt(val);
      document.getElementById('lblWindPower').textContent = val + '%';
      debouncedWrite('windPower', chars.windPower, state.windPower);
    }

    function setHumidMode(mode) {
      state.humidMode = mode;
      updateHumidModeUI();
      writeUint8(chars.humidMode, mode);
    }

    function onTargetHumidChange(val) {
      state.targetHumid = parseInt(val);
      document.getElementById('lblTargetHumid').textContent = val + '%';
      debouncedWrite('targetHumid', chars.targetHumid, state.targetHumid);
    }

    function toggleLed() {
      state.ledOn = !state.ledOn;
      updateLedUI();
      writeUint8(chars.ledSwitch, state.ledOn ? 1 : 0);
    }

    function onColorChange(hex) {
      const r = parseInt(hex.substr(1,2), 16);
      const g = parseInt(hex.substr(3,2), 16);
      const b = parseInt(hex.substr(5,2), 16);
      state.ledR = r; state.ledG = g; state.ledB = b;
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('lblColorHex').textContent = hex.toUpperCase();
      if (!connected || !chars.ledColor) return;
      clearTimeout(writeTimers['ledColor']);
      writeTimers['ledColor'] = setTimeout(async () => {
        try {
          await chars.ledColor.writeValue(new Uint8Array([r, g, b]));
        } catch(e) { console.error('LED color write error:', e); }
      }, 50);
    }

    function onLedBrightChange(val) {
      state.ledBright = parseInt(val);
      document.getElementById('lblLedBright').textContent = val;
      debouncedWrite('ledBright', chars.ledBright, state.ledBright);
    }

    // ============================================================
    // UI Update Functions
    // ============================================================
    function updateAllUI() {
      updatePowerUI();

      document.getElementById('sldSteam').value = state.steam;
      document.getElementById('lblSteam').textContent = state.steam + '%';

      document.getElementById('sldWindDir').value = state.windDir;
      document.getElementById('lblWindDir').textContent = state.windDir + '°';
      updateWindArrow(state.windDir);

      updateSweepUI();
      document.getElementById('sldSweepFreq').value = state.sweepFreq;
      document.getElementById('lblSweepFreq').textContent = state.sweepFreq + 's';

      document.getElementById('sldWindPower').value = state.windPower;
      document.getElementById('lblWindPower').textContent = state.windPower + '%';

      updateHumidModeUI();
      document.getElementById('sldTargetHumid').value = state.targetHumid;
      document.getElementById('lblTargetHumid').textContent = state.targetHumid + '%';

      updateLedUI();
      const hex = '#' + [state.ledR, state.ledG, state.ledB].map(v => v.toString(16).padStart(2,'0')).join('');
      document.getElementById('colorPicker').value = hex;
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('lblColorHex').textContent = hex.toUpperCase();
      document.getElementById('sldLedBright').value = state.ledBright;
      document.getElementById('lblLedBright').textContent = state.ledBright;
    }

    function updatePowerUI() {
      const btn = document.getElementById('btnPower');
      const wrap = document.getElementById('controlsWrap');
      if (state.power) {
        btn.classList.add('active');
        wrap.classList.remove('disabled-overlay');
      } else {
        btn.classList.remove('active');
        wrap.classList.add('disabled-overlay');
      }
    }

    function updateSweepUI() {
      const btn = document.getElementById('btnSweep');
      const wrap = document.getElementById('sweepFreqWrap');
      const dirSlider = document.getElementById('sldWindDir');
      if (state.sweep) {
        btn.classList.add('active');
        wrap.classList.remove('hidden');
        dirSlider.disabled = true;
        dirSlider.style.opacity = '0.4';
      } else {
        btn.classList.remove('active');
        wrap.classList.add('hidden');
        dirSlider.disabled = false;
        dirSlider.style.opacity = '1';
      }
    }

    function updateHumidModeUI() {
      const pillManual = document.getElementById('pillManual');
      const pillAuto = document.getElementById('pillAuto');
      const targetWrap = document.getElementById('targetHumidWrap');
      const steamCard = document.getElementById('sldSteam');

      if (state.humidMode === 1) {
        pillAuto.classList.add('active');
        pillManual.classList.remove('active');
        targetWrap.classList.remove('hidden');
        steamCard.disabled = true;
        steamCard.style.opacity = '0.4';
      } else {
        pillManual.classList.add('active');
        pillAuto.classList.remove('active');
        targetWrap.classList.add('hidden');
        steamCard.disabled = false;
        steamCard.style.opacity = '1';
      }
    }

    function updateWindArrow(angle) {
      const arrow = document.getElementById('windArrow');
      // Map angle: -60 → -60°,  0 → 0°, +60 → +60° rotation
      arrow.style.transform = `rotate(${angle}deg)`;
    }

    function updateLedUI() {
      const btn = document.getElementById('btnLed');
      const wrap = document.getElementById('ledControlWrap');
      if (state.ledOn) {
        btn.classList.add('active');
        wrap.style.opacity = '1';
        wrap.style.pointerEvents = 'auto';
      } else {
        btn.classList.remove('active');
        wrap.style.opacity = '0.35';
        wrap.style.pointerEvents = 'none';
      }
    }

    // Init UI state
    updatePowerUI();
    updateSweepUI();
    updateHumidModeUI();
    updateLedUI();
  </script>
</body>

</html>
